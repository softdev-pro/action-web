name: Update Streams
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install node-cron

      - name: Unzip script
        run: |
          sudo apt-get install -y unzip
          unzip -P ${{ secrets.ZIP_PASS }} vps_server.zip

      - name: Run script
        env:
          DB_URL: ${{ secrets.DB_URL }}
          TZ: Asia/Dhaka
        run: node vps_server.js

      - name: Commit and Push Data
        run: |
          git config --global user.name "GitHub Actions Automation"
          git config --global user.email "actions@github.com"
          git add *.json *.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update streams via GitHub Actions"
          git push


